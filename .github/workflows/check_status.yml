name: Check UIUC Application Status

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run status check
        id: status_check
        env:
          ILLINOIS_EMAIL:    ${{ secrets.ILLINOIS_EMAIL }}
          ILLINOIS_PASSWORD: ${{ secrets.ILLINOIS_PASSWORD }}
        run: python check_status.py
        continue-on-error: true

      - name: Build dashboard HTML
        run: python build_html.py

      - name: Commit and push updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/bharath2580/status.git
          git add status.json index.html
          git diff --cached --quiet || git commit -m "Status check $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Send alert email if status changed
        if: steps.status_check.outcome == 'failure'
        run: |
          python - <<'EOF'
          import smtplib, os, json
          from email.mime.text import MIMEText

          with open("status.json") as f:
              d = json.load(f)

          body = f"""Your UIUC application status has changed!

          Previous: {d['previous_status']}
          Current:  {d['status']}

          Check your dashboard:
          https://bharath2580.github.io/status

          Or log in directly:
          https://choose.illinois.edu/apply/status
          """

          msg = MIMEText(body)
          msg["Subject"] = "🚨 UIUC Application Status Changed!"
          msg["From"]    = os.environ["NOTIFY_EMAIL"]
          msg["To"]      = os.environ["NOTIFY_EMAIL"]

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as smtp:
              smtp.login(os.environ["NOTIFY_EMAIL"], os.environ["NOTIFY_EMAIL_PASSWORD"])
              smtp.send_message(msg)

          print("Alert email sent!")
          EOF
        env:
          NOTIFY_EMAIL:          ${{ secrets.NOTIFY_EMAIL }}
          NOTIFY_EMAIL_PASSWORD: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
