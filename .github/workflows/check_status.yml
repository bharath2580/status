name: Check UIUC Application Status

on:
  schedule:
    - cron: '0 6 * * *'    # 6 AM UTC = 11:30 AM IST daily
  workflow_dispatch:         # manual trigger button in GitHub UI

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run status check
        id: status_check
        env:
          ILLINOIS_EMAIL:    ${{ secrets.ILLINOIS_EMAIL }}
          ILLINOIS_PASSWORD: ${{ secrets.ILLINOIS_PASSWORD }}
        run: python check_status.py
        continue-on-error: true   # don't abort workflow on exit(1)

      - name: Build dashboard HTML
        run: python build_html.py

      - name: Commit and push updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add status.json index.html
          git diff --cached --quiet || git commit -m "Status check $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Send alert email if status changed
        if: steps.status_check.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_EMAIL }}
          password: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          subject: "🚨 UIUC Application Status Changed!"
          body: |
            Your UIUC application status has changed from "Awaiting Decision".
            
            Check your dashboard immediately:
            https://bharath2580.github.io/uiuc-status-checker
            
            Or log in directly:
            https://choose.illinois.edu/apply/status
